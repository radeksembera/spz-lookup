<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vyhledávání vozidel</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f5f7fa;
      color: #1a202c;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 16px;
    }

    header {
      text-align: center;
      margin-bottom: 36px;
    }

    header h1 {
      font-size: 1.9rem;
      font-weight: 700;
      color: #1a202c;
      letter-spacing: -0.4px;
    }

    header p {
      margin-top: 7px;
      color: #718096;
      font-size: 0.88rem;
    }

    .card {
      background: #ffffff;
      border: 1px solid #e8ecf0;
      border-radius: 16px;
      padding: 40px 44px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.07);
    }

    label {
      display: block;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.7px;
      text-transform: uppercase;
      color: #a0aec0;
      margin-bottom: 6px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    @media (max-width: 480px) {
      body { padding: 32px 12px; }

      .card { padding: 28px 20px; }

      .input-row { flex-direction: column; align-items: stretch; }

      .btn-demo { text-align: center; }

      table, tbody, tr, td { display: block; width: 100%; }

      tr { padding: 10px 0; }
      tr:not(:last-child) { border-bottom: 1px solid #f0f4f8; }
      tr:not(:last-child) td { border-bottom: none; }

      td { padding: 2px 6px; }
      td:first-child { color: #a0aec0; font-size: 0.72rem; padding-bottom: 1px; }
      td:last-child  { color: #2d3748; font-size: 0.95rem; padding-top: 1px; }
    }

    input[type="text"] {
      flex: 1;
      padding: 13px 16px;
      background: #f9fafb;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      color: #1a202c;
      font-size: 1rem;
      letter-spacing: 0.8px;
      outline: none;
      transition: border-color 0.18s, box-shadow 0.18s;
    }

    input[type="text"]:focus {
      border-color: #667eea;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(102,126,234,0.12);
    }

    input[type="text"]::placeholder {
      color: #cbd5e0;
      letter-spacing: 0;
      font-size: 0.9rem;
    }

    .btn-demo {
      padding: 13px 14px;
      background: #f0f4ff;
      color: #667eea;
      border: 1.5px solid #c7d2fe;
      border-radius: 10px;
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      letter-spacing: 0.3px;
      transition: background 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }

    .btn-demo:hover {
      background: #e0e7ff;
      border-color: #818cf8;
    }

    .btn-submit {
      display: block;
      width: 100%;
      margin-top: 16px;
      padding: 14px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.18s, transform 0.1s;
      letter-spacing: 0.2px;
    }

    .btn-submit:hover   { background: #5a67d8; }
    .btn-submit:active  { transform: scale(0.98); }
    .btn-submit:disabled {
      background: #e2e8f0;
      color: #a0aec0;
      cursor: not-allowed;
    }

    /* Result */
    #result {
      margin-top: 28px;
      display: none;
    }

    .result-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 14px;
      border-bottom: 1px solid #edf2f7;
    }

    .result-header h2 {
      font-size: 0.85rem;
      font-weight: 600;
      color: #718096;
      flex: 1;
      letter-spacing: 0.3px;
    }

    .badge {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.7px;
      padding: 3px 10px;
      border-radius: 20px;
      text-transform: uppercase;
    }

    .badge-ok  { background: #f0fff4; color: #276749; border: 1px solid #9ae6b4; }
    .badge-err { background: #fff5f5; color: #c53030; border: 1px solid #feb2b2; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    tr { transition: background 0.12s; }
    tr:hover { background: #f9fafb; }
    tr:not(:last-child) td { border-bottom: 1px solid #f0f4f8; }

    td {
      padding: 11px 6px;
      vertical-align: middle;
    }

    td:first-child {
      color: #a0aec0;
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      width: 42%;
    }

    td:last-child {
      color: #2d3748;
      font-weight: 600;
    }

    .error-box {
      background: #fff5f5;
      border: 1px solid #fed7d7;
      border-radius: 10px;
      padding: 14px 16px;
      color: #c53030;
      font-size: 0.88rem;
      line-height: 1.6;
    }

    .spinner {
      display: inline-block;
      width: 15px; height: 15px;
      border: 2px solid #c7d2fe;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 7px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    footer {
      margin-top: 40px;
      font-size: 0.77rem;
      color: #cbd5e0;
      text-align: center;
    }

    footer a { color: #a0aec0; text-decoration: none; }
    footer a:hover { color: #718096; }
  </style>
</head>
<body>

<header>
  <h1>Vyhledávání vozidel</h1>
  <p>Technická data vozidla podle VIN</p>
</header>

<div class="card">
  <form id="vehicleForm">
    <label for="vinInput">VIN číslo</label>
    <div class="input-row">
      <input
        type="text"
        id="vinInput"
        name="vin"
        placeholder="např. TMBEFF654V7529422"
        maxlength="17"
        autocomplete="off"
        autofocus
      />
      <button type="button" class="btn-demo" id="demoBtn">Vlož ukázkový</button>
    </div>
    <button type="submit" class="btn-submit" id="searchBtn">Vyhledat vozidlo</button>

    <div id="result">
      <div class="result-header">
        <h2 id="resultTitle">Výsledek</h2>
        <span id="resultBadge" class="badge"></span>
      </div>
      <div id="resultBody"></div>
    </div>
  </form>
</div>

<footer>
  Zdroj dat: <a href="https://www.dataovozidlech.cz" target="_blank">dataovozidlech.cz</a>
</footer>

<script>
  const form   = document.getElementById('vehicleForm');
  const btn    = document.getElementById('searchBtn');
  const demoBtn= document.getElementById('demoBtn');
  const result = document.getElementById('result');
  const title  = document.getElementById('resultTitle');
  const badge  = document.getElementById('resultBadge');
  const body   = document.getElementById('resultBody');

  demoBtn.addEventListener('click', () => {
    document.getElementById('vinInput').value = 'TMBEFF654V7529422';
    document.getElementById('vinInput').focus();
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const vin = document.getElementById('vinInput').value.trim().toUpperCase();

    if (!vin) {
      showError('Zadejte VIN číslo vozidla.');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Hledám…';
    result.style.display = 'none';
    body.innerHTML = '';

    try {
      const fd = new FormData();
      fd.append('vin', vin);
      fd.append('tp', '');
      fd.append('orv', '');

      const resp = await fetch('/lookup', { method: 'POST', body: fd });
      const data = await resp.json();

      result.style.display = 'block';
      title.textContent = data.query || `VIN: ${vin}`;

      if (data.error) { showError(data.error); return; }

      badge.textContent = 'Nalezeno';
      badge.className = 'badge badge-ok';
      body.innerHTML = `<table>${
        data.fields.map(f =>
          `<tr><td>${esc(f.label)}</td><td>${esc(f.value)}</td></tr>`
        ).join('')
      }</table>`;

    } catch (err) {
      showError('Chyba komunikace se serverem: ' + err);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Vyhledat vozidlo';
    }
  });

  function showError(msg) {
    result.style.display = 'block';
    badge.textContent = 'Chyba';
    badge.className = 'badge badge-err';
    body.innerHTML = `<div class="error-box">${esc(msg)}</div>`;
  }

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
